<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumo de pedido</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
        integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="shortcut icon" href="src/img/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="src/css/reset.css">
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body>
    <div class="container">
        <div class="pedido">
            <img src="src/img/illustration-hero.svg" alt="Imagem de ilustração">
            <h2>Order Summary</h2>
            <p>You can now listen to milllions of songs,
                audiobooks, and podcasts on any device
                anywhere you like!
            </p>

            <div class="icon">
                <i class="fas fa-music"></i>
                <div class="valor">
                    <span class="legenda">Annual Plan</span>
                    <span>$59.99/year</span>
                </div>
                <p>Change</p>
            </div>

            <div class="btn">
                <button class="proceed">Proceed to Payment</button> <br><br>
                <button class="cancel">Cancel Order</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"
        integrity="sha512-Tn2m0TIpgVyTzzvmxLNuqbSJH3JP8jm+Cy3hvHrW7ndTDcJ1w5mBiksqDBb8GpE2ksktFvDB/ykZ0mDpsZj20w=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
        </script>
</body>

</html>
